
name: Build CinemaProPlayer APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project if a zip is present
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found zip: $ZIP_FILE — extracting into repo root"
            unzip -o "$ZIP_FILE" -d .
          else
            echo "No zip found at root, assuming project files already present"
          fi

      - name: Verify Gradle project files exist
        run: |
          if [ ! -f settings.gradle ] && [ ! -f settings.gradle.kts ]; then
            echo "ERROR: settings.gradle not found at repo root after extraction."
            echo "Check that the zip's internal files are flat (build.gradle, settings.gradle, app/ at top level), not nested in a subfolder."
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle (auto-provisions Gradle, no wrapper jar needed)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CinemaProPlayer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CinemaProPlayer-release-apk-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
